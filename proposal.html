<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Usulan | Grants Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="index.css">
    <style>
        /* Component Specific Overrides */
        nav {
            padding: 1rem 5%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 12px var(--primary-soft);
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .card-grid {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 2rem;
            align-items: start;
        }

        .detail-card {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: var(--radius-xl);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-paper);
        }

        .info-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 0.25rem;
            display: block;
        }

        .info-value {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-main);
        }

        /* Tabs */
        .tab-header {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.02);
            padding: 0 2rem;
        }

        .tab-btn {
            padding: 1.25rem 2rem;
            font-weight: 700;
            color: var(--text-muted);
            position: relative;
            background: transparent;
            border: none;
            cursor: pointer;
            outline: none;
            font-family: inherit;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            font-size: 1.05rem;
            transition: var(--transition);
            padding: 8px 16px;
            border-radius: 12px;
            background: rgba(0,0,0,0.02);
            border: 1px solid var(--border);
        }
        .back-btn:hover {
            background: var(--surface);
            transform: translateX(-4px);
        }

        .tab-btn.active { color: var(--primary); }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 1.5rem;
            right: 1.5rem;
            height: 3px;
            background: var(--primary);
            border-radius: 10px 10px 0 0;
        }

        .group-container {
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.5);
            padding: 1.5rem 2rem;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .group-header {
            font-size: 0.85rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 0.75rem;
            border-bottom: 1px dashed var(--border);
        }

        /* Review Cards */
        .review-card {
            padding: 2rem;
            border-radius: var(--radius-lg);
            background: var(--background);
            border: 1px solid var(--border);
            position: relative;
            transition: var(--transition);
        }

        .review-card:hover {
            border-color: var(--primary);
            background: var(--surface);
            box-shadow: var(--shadow-md);
        }

        .review-score-badge {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: var(--primary);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            font-weight: 800;
            font-family: 'Outfit';
        }

        @media (max-width: 1024px) {
            .card-grid { grid-template-columns: 1fr; }
            .container { padding: 2rem 1.5rem; }
        }

        @media (max-width: 640px) {
            nav { padding: 1rem; flex-direction: column; gap: 0.75rem; }
            .tab-header { padding: 0 1rem; overflow-x: auto; }
            .tab-btn { padding: 1rem; font-size: 0.875rem; }
            .detail-card { padding: 1.5rem; }
            .review-score-badge { position: static; display: inline-block; margin-bottom: 1rem; }
        }
    </style>
</head>

<body>
    <nav>
        <a href="index.html" class="logo">
            <div class="logo-icon"><span class="material-symbols-outlined">description</span></div>
            <span>Grants Portal</span>
        </a>
        <div style="display:flex; align-items:center; gap:16px;">
            <span style="font-size:0.85rem; color:var(--text-muted);">Simulasi Login:</span>
            <select id="mock-login" onchange="changeMockUser()" style="padding:6px 12px; border-radius:8px; border:1px solid var(--border); font-size:0.85rem; outline:none;">
            </select>
        </div>
    </nav>

    <div class="container">
        <div class="header-row">
            <a href="index.html" class="back-btn" id="nav-back-link">
                <span class="material-symbols-outlined">arrow_back</span>
                Kembali ke Dashboard
            </a>
            <div id="proposal-id-tag"
                style="font-weight:700; color:var(--text-muted); background:var(--border); padding:4px 12px; border-radius:8px; font-size:0.85rem;">
                ID: #0000</div>
        </div>

        <div id="blacklist-banner" style="display:none; margin-bottom:32px;"></div>

        <div class="card-grid">
            <!-- Left: Basic Info -->
            <div class="detail-card">
                <div id="authors-list-card" class="info-group" style="margin-bottom: 2rem;">
                    <div class="group-header">
                        <span class="material-symbols-outlined">group</span>
                        Tim Peneliti & Authors
                    </div>
                    <div id="proposal-authors" style="display:grid; gap:12px;">
                        <!-- Authors list here -->
                    </div>
                </div>

                <div class="card-title" style="display:flex; justify-content:space-between; align-items:center; width:100%; border-bottom:1px solid var(--border); padding-bottom:12px; margin-bottom:20px;">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <span class="material-symbols-outlined" style="color:var(--primary);">description</span>
                        <span style="font-family:'Outfit'; font-size:1.1rem; font-weight:800;">Informasi Utama</span>
                    </div>
                    <button class="btn-icon" onclick="openEditBasicModal()" title="Edit Info Utama" style="background:white; border:1px solid var(--border); width:36px; height:36px;">
                        <span class="material-symbols-outlined" style="font-size:1.1rem; color:var(--text-main);">edit_square</span>
                    </button>
                </div>
                
                <div class="info-group">
                    <label class="info-label">Judul Usulan</label>
                    <div class="info-value" id="disp-title" style="font-family:'Outfit'; font-size:1.35rem; line-height:1.4; color:var(--text-main); margin-top:6px;">Memuat...</div>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-bottom:12px;">
                    <div class="info-group">
                        <label class="info-label">Ketua Pengusul</label>
                        <div class="info-value" id="disp-proposer" style="font-weight:600;">-</div>
                    </div>
                    <div class="info-group">
                        <label class="info-label">Unit / Fakultas</label>
                        <div class="info-value" id="disp-unit">-</div>
                    </div>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-bottom:12px;">
                    <div class="info-group">
                        <label class="info-label">Waktu Pengajuan</label>
                        <div class="info-value" id="disp-date">-</div>
                    </div>
                    <div class="info-group">
                        <label class="info-label">Status Usulan</label>
                        <div id="disp-status-container" style="margin-top:4px;">
                            <span class="badge-status" id="disp-status">-</span>
                        </div>
                    </div>
                </div>

                <div style="margin-top:32px; padding-top:24px; border-top:1px solid var(--paper-edge);">
                    <div class="form-group">
                        <label class="f-label"><span class="material-symbols-outlined" style="font-size:1rem; vertical-align:middle; margin-right:4px;">settings</span> Kelola Status</label>
                        <select id="update-status" class="f-input" onchange="updateStatusBadge(); enableSave()" style="font-weight:700;">
                            <!-- Options injected by JS -->
                        </select>
                        <div id="auto-status-hint" style="font-size:0.75rem; color:var(--text-muted); margin-top:10px; font-style:italic;"></div>
                    </div>
                </div>
            </div>

            <!-- Right: Dynamic Attributes & Reviews -->
            <div class="detail-card" style="padding:0; overflow:hidden;">
                <!-- Tab Header -->
                <div class="tab-header">
                    <button class="tab-btn active" onclick="switchMainTab('detail', this)">
                        Detail Usulan
                    </button>
                    <button class="tab-btn" onclick="switchMainTab('review', this)">
                        Hasil Penilaian & Review
                    </button>
                </div>

                <!-- Tab Content: Detail -->
                <div id="main-tab-detail" style="padding:40px;">
                    <div class="card-title">
                        <span class="material-symbols-outlined" style="color:var(--primary);">edit_note</span>
                        Data Terkait Usulan
                    </div>
                    <div id="dynamic-form-container">
                        <!-- Fields injected -->
                    </div>
                    
                    <div id="proposal-files-container" style="margin-top:32px;">
                        <!-- Files injected -->
                    </div>

                    <div style="margin-top:40px; display:flex; justify-content:flex-end;">
                        <button id="btn-save" class="btn-apply" onclick="saveChanges()" style="opacity:0.6; pointer-events:none;">
                            <span class="material-symbols-outlined">save</span>
                            Simpan Perubahan
                        </button>
                    </div>
                </div>

                <!-- Tab Content: Review -->
                <div id="main-tab-review" style="display:none; padding:40px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:28px;">
                        <div class="card-title" style="margin:0;">
                            <span class="material-symbols-outlined" style="color:var(--primary);">rate_review</span>
                            Daftar Penilaian
                        </div>
                        <button class="btn-apply" id="btn-add-review" onclick="openAddReviewModal()" style="font-size:0.85rem; padding:10px 18px;">
                            <span class="material-symbols-outlined" style="font-size:1.1rem;">add_circle</span> Tambah Review
                        </button>
                    </div>
                    <div id="reviews-history-container" style="display:flex; flex-direction:column; gap:24px;">
                        <!-- Reviews injected -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay" onclick="if(event.target === this) closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modal-title" style="font-family:'Outfit'; font-size:1.5rem; margin:0;">Tambah Penilaian</h2>
                <button onclick="closeModal()" class="btn-icon" style="background:none; border:none; cursor:pointer; color:var(--text-muted);"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

    <div id="toast" class="toast-container">
        <span class="material-symbols-outlined" style="font-size:20px;">check_circle</span>
        <span id="toast-msg">Berhasil diperbarui!</span>
    </div>

    <script>
        const proposals = JSON.parse(localStorage.getItem('grants_proposals')) || [
            { id: 101, title: "Modernisasi Jaringan Listrik Universitas", program: "Grants 2025", proposer: "Budi Santoso", date: "2025-01-15", status: "Approved", allowMultiple: false },
            { id: 102, title: "Penelitian Robotika Dasar", program: "Riset Unggulan", proposer: "Rahmat Hidayat", date: "2024-11-20", status: "Under Review", allowMultiple: true },
            { id: 103, title: "Penerapan AI dalam Ekonomi Kreatif", program: "Abdimas 2024", proposer: "Ani Wijaya", date: "2024-12-05", status: "Completed", allowMultiple: false }
        ];
        const programs = JSON.parse(localStorage.getItem('grants_programs_meta')) || [
            {
                id: '1',
                name: "Grants 2025",
                desc: "Program hibah kompetitif untuk inovasi teknologi masa depan.",
                icon: "rocket_launch",
                color: "#6366f1",
                allowMultiple: true,
                attributes: [
                    { label: "Nominal Dana (IDR)", type: "number", required: true, desc: "Batas maksimal 100jt" },
                    { label: "Durasi Proyek (Bulan)", type: "number", required: true },
                    { label: "Bidang Fokus", type: "dropdown", options: ["AI/ML", "Green Tech", "Biotech"], required: true },
                    { label: "Abstrak Pendek", type: "longtext", required: true }
                ]
            },
            {
                id: '2',
                name: "Riset Unggulan",
                desc: "Penelitian mendalam untuk pengembangan ilmu pengetahuan.",
                icon: "biotech",
                color: "#10b981",
                allowMultiple: true,
                attributes: [
                    { label: "Metodologi", type: "longtext", required: true },
                    { label: "Target Luaran", type: "dropdown", options: ["Jurnal Q1", "Paten", "Prototipe"], required: true }
                ]
            },
            {
                id: '3',
                name: "Abdimas 2024",
                desc: "Program pengabdian masyarakat untuk peningkatan ekonomi lokal.",
                icon: "group",
                color: "#f59e0b",
                allowMultiple: false,
                attributes: [
                    { label: "Lokasi Pengabdian (Kecamatan/Desa)", type: "text", required: true },
                    { label: "Jumlah Beneficiary (Penerima Manfaat)", type: "number", required: true },
                    { label: "Uraian Masalah Mitra", type: "longtext", required: true }
                ]
            }
        ];
        const urlParams = new URLSearchParams(window.location.search);
        const proposalId = urlParams.get('id');

        const registeredUsers = [
            { id: 1, name: "Admin Utama", unit: "Pusat IT", role: "Superadmin", email: "admin@univ.ac.id" },
            { id: 2, name: "Manager Hibah", unit: "Direktorat Inovasi", role: "Manager", email: "manager@univ.ac.id" },
            { id: 3, name: "Siti Aminah", unit: "Fakultas Teknik", role: "Editor", email: "siti@univ.ac.id" },
            { id: 4, name: "Dr. Budi Santoso", unit: "Fakultas Sains", role: "Pengusul", email: "budi@univ.ac.id" },
            { id: 5, name: "Prof. Rahmat Hidayat", unit: "Fakultas Kedokteran", role: "Reviewer", email: "rahmat@univ.ac.id" },
            { id: 6, name: "Pengusul Luar", unit: "Umum", role: "Pengusul", email: "tamu@univ.ac.id" }
        ];

        let currentUser = localStorage.getItem('grants_activeUser') ? JSON.parse(localStorage.getItem('grants_activeUser')) : registeredUsers[0];

        let currentProposal = null;
        let currentProgram = null;

        function changeMockUser() {
            const select = document.getElementById('mock-login');
            const user = registeredUsers.find(u => u.name === select.value);
            if (user) {
                currentUser = user;
                localStorage.setItem('grants_activeUser', JSON.stringify(currentUser));
                renderAttributes();
                renderReviews();
            }
        }

        function switchMainTab(tab, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active');
                b.style.color = 'var(--text-muted)';
                b.style.borderBottom = 'none';
            });
            btn.classList.add('active');
            btn.style.color = 'var(--primary)';
            btn.style.borderBottom = '3px solid var(--primary)';

            document.getElementById('main-tab-detail').style.display = tab === 'detail' ? 'block' : 'none';
            document.getElementById('main-tab-review').style.display = tab === 'review' ? 'block' : 'none';
        }

        function closeModal() {
            const over = document.getElementById('modal-overlay');
            over.classList.remove('show');
            setTimeout(() => over.style.display = 'none', 300);
        }

        function showModal(title, body) {
            const over = document.getElementById('modal-overlay');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerHTML = body;
            over.style.display = 'flex';
            setTimeout(() => over.classList.add('show'), 10);
        }

        function renderReviews() {
            const container = document.getElementById('reviews-history-container');
            if (!container) return;
            const reviews = currentProposal.reviews || [];
            const assignments = currentProposal.assignments || [];

            let html = "";

            // --- PENDING ASSIGNMENTS ---
            if (assignments.length > 0) {
                html += `
                    <div style="margin-bottom:2.5rem;" class="animate-fade-in">
                        <h4 style="font-size:0.75rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:1.5rem; display:flex; align-items:center; gap:10px; font-weight:800;">
                            <span class="material-symbols-outlined" style="font-size:20px; color:var(--primary)">pending_actions</span> Penugasan Reviewer (Tertunda)
                        </h4>
                        <div style="display:flex; flex-direction:column; gap:1rem;">
                            ${assignments.map((as, idx) => {
                                const isMe = currentUser.name === as.reviewer;
                                const isAdmin = ['Superadmin', 'Admin', 'Manager'].includes(currentUser.role);
                                const displayName = (isMe || isAdmin) ? as.reviewer : `Reviewer ${idx + 1}`;
                                const displayInitial = (isMe || isAdmin) ? as.reviewer[0] : 'R';

                                return `
                                    <div class="glass" style="padding:1.5rem 2rem; border-radius:var(--radius-lg); border:1px solid rgba(99,102,241,0.2); background:rgba(99,102,241,0.02); display:flex; justify-content:space-between; align-items:center; transition:var(--transition);">
                                        <div style="display:flex; align-items:center; gap:1.5rem;">
                                            <div style="width:44px; height:44px; border-radius:12px; background:var(--primary-soft); color:var(--primary); display:flex; align-items:center; justify-content:center; font-weight:900;">${displayInitial}</div>
                                            <div>
                                                <div style="font-weight:800; color:var(--text-main); font-size:1.1rem; letter-spacing:-0.01em;">${displayName}</div>
                                                <div style="font-size:0.75rem; color:var(--text-muted); margin-top:4px; display:flex; align-items:center; gap:12px;">
                                                    <span style="display:flex; align-items:center; gap:6px;"><span class="material-symbols-outlined" style="font-size:16px;">calendar_today</span>Tenggat: <strong style="color:var(--primary)">${as.dueDate}</strong></span>
                                                    ${(isMe || isAdmin) ? `<span style="opacity:0.3">•</span><span style="display:flex; align-items:center; gap:6px;"><span class="material-symbols-outlined" style="font-size:16px;">person</span>Oleh: ${as.assignedBy}</span>` : ''}
                                                </div>
                                            </div>
                                        </div>
                                        <div style="display:flex; gap:1rem; align-items:center;">
                                            ${(isMe || ['Superadmin', 'Admin'].includes(currentUser.role)) ? `
                                                <button class="btn-primary" onclick="openAddReviewModal('${as.reviewer}')" style="font-size:0.8rem; padding:8px 20px; height:40px; border-radius:10px;">
                                                    <span class="material-symbols-outlined" style="font-size:18px;">edit_document</span> Isi Review
                                                </button>
                                            ` : `
                                                <span class="status-badge" style="background:var(--background); border:1px solid var(--border); color:var(--text-muted); padding:6px 14px; border-radius:10px; font-weight:800; font-size:0.75rem;">MENUNGGU REVIEW</span>
                                            `}
                                            ${(['Superadmin', 'Admin', 'Manager'].includes(currentUser.role)) ? `
                                                <button class="btn-icon" onclick="removeAssignment(${idx})" style="color:var(--error); border:none; background:transparent;"><span class="material-symbols-outlined" style="font-size:22px;">do_not_disturb_on</span></button>
                                            ` : ''}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }

            // --- ASSIGNMENT FORM (Admin/Manager Only) ---
            if (['Superadmin', 'Admin', 'Manager'].includes(currentUser.role)) {
                const programReviewers = currentProgram.reviewers || [];
                const availableReviewers = programReviewers.filter(r => !assignments.some(as => as.reviewer === r));
                
                if (availableReviewers.length > 0) {
                    html += `
                        <div class="glass config-card animate-fade-in" style="padding:2rem; border-radius:var(--radius-xl); border:1px dashed var(--primary); background:rgba(99,102,241,0.01); margin-bottom:3rem; box-shadow:none;">
                            <div style="display:flex; align-items:center; gap:10px; margin-bottom:1.5rem;">
                                <span class="material-symbols-outlined" style="color:var(--primary); font-size:24px;">group_add</span>
                                <div style="font-weight:900; font-family:Outfit; font-size:1.1rem; color:var(--text-main); letter-spacing:-0.01em;">Tugaskan Reviewer Ahli</div>
                            </div>
                            <div style="display:grid; grid-template-columns: 1.5fr 1fr auto; gap:1.25rem; align-items:flex-end;">
                                <div class="f-group" style="margin:0;">
                                    <label class="f-label">Reviewer Terdaftar</label>
                                    <select id="assign-reviewer-select" class="f-input" style="height:48px;">
                                        <option value="">-- Pilih Nama Reviewer --</option>
                                        ${availableReviewers.map(r => `<option value="${r}">${r}</option>`).join('')}
                                    </select>
                                </div>
                                <div class="f-group" style="margin:0;">
                                    <label class="f-label">Tenggat Waktu</label>
                                    <input type="date" id="assign-due-date" class="f-input" style="height:48px;">
                                </div>
                                <button class="btn-primary" onclick="assignReviewer()" style="height:48px; min-width:160px; border-radius:12px;">
                                    <span class="material-symbols-outlined" style="font-size:20px;">assignment_ind</span> Tugaskan
                                </button>
                            </div>
                            <p style="margin-top:1rem; font-size:0.75rem; color:var(--text-muted); font-weight:600;">Reviewer akan mendapatkan notifikasi e-mail segera setelah penugasan dibuat.</p>
                        </div>
                    `;
                }
            }

            // --- COMPLETED REVIEWS ---
            html += `
                <h4 style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:16px; display:flex; align-items:center; gap:8px;">
                    <span class="material-symbols-outlined" style="font-size:16px; color:var(--secondary)">task_alt</span> Hasil Review Selesai
                </h4>
            `;

            if (reviews.length === 0) {
                html += `<div style="text-align:center; padding:60px; color:var(--text-muted); border:1px dashed var(--border); border-radius:16px;">Belum ada hasil review yang diselesaikan untuk usulan ini.</div>`;
            } else {
                html += reviews.map((rev, idx) => {
                    const totalScore = rev.items.reduce((sum, i) => {
                        const val = parseFloat(i.value) || 0;
                        const weight = parseFloat(i.weight) || 0;
                        return sum + (val * (weight / 100));
                    }, 0);

                    const isMe = currentUser.name === rev.reviewer;
                    const isAdmin = ['Superadmin', 'Admin', 'Manager'].includes(currentUser.role);
                    const displayName = (isMe || isAdmin) ? rev.reviewer : `Reviewer ${idx + 1}`;

                    return `
                        <div class="review-card glass" style="margin-bottom:20px;">
                            <div class="reviewer-name">${displayName}</div>
                            <div class="review-meta">${rev.period} • ${rev.date}</div>
                            ${totalScore > 0 ? `<div class="review-score-badge">${totalScore.toFixed(1)}</div>` : ''}
                            
                            <div style="font-size:0.85rem; display:flex; flex-direction:column; gap:10px; margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
                                ${rev.items.map(item => `
                                    <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:20px;">
                                        <span style="color:var(--text-muted); font-size:0.8rem;">${item.label}</span>
                                        <span style="font-weight:600; text-align:right; max-width:60%; word-break:break-word;">
                                            ${item.type === 'file' ? (item.value ? `<a href="#" onclick="alert('Buka file: ${item.value}')" style="color:var(--primary); text-decoration:none;">Lihat Berkas</a>` : '-') : item.value || '-'}
                                        </span>
                                    </div>
                                `).join('')}
                            </div>
                            ${(['Superadmin', 'Admin'].includes(currentUser.role) || currentUser.name === rev.reviewer) ? `
                                <div style="margin-top:20px; display:flex; justify-content:flex-end; border-top:1px dashed var(--border); padding-top:12px;">
                                    <button onclick="deleteReview(${idx})" style="background:none; border:none; color:var(--error); font-size:0.75rem; cursor:pointer; display:flex; align-items:center; gap:4px; opacity:0.7;">
                                        <span class="material-symbols-outlined" style="font-size:16px">delete</span> Hapus Review
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }).join('');
            }
            
            container.innerHTML = html;

            // Admin, Manager, and Reviewer roles can add reviews manually
            const btnAdd = document.getElementById('btn-add-review');
            if (btnAdd) {
                const canReview = ['Superadmin', 'Admin', 'Reviewer', 'Manager'].includes(currentUser.role);
                btnAdd.style.display = canReview ? 'flex' : 'none';
            }
        }

                    </div>
                    <div class="form-group" style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">

                            <label class="f-label">Unit / Fakultas</label>

                        <button class="btn-apply" onclick="saveBasicInfo()">Simpan Perubahan</button>

        function filterGeneric(input) {
            const val = input.value.toLowerCase();
            const list = input.nextElementSibling;
            const items = list.querySelectorAll('div');
            items.forEach(it => {
                if (it.innerText.toLowerCase().includes(val)) it.style.display = 'block';
                else it.style.display = 'none';
            });
        }

        function selectGeneric(el, val) {
            const container = el.closest('.searchable-select');
            const input = container.querySelector('input[type="text"]');
            input.value = val;
            
            // Hide dropdown - clearing 'block' from style attribute will revert to 'none' in CSS
            el.parentElement.style.display = '';

            // Auto-fill unit if found
            const user = registeredUsers.find(u => u.name === val);
            if (user && document.getElementById('edit-basic-unit')) {
                document.getElementById('edit-basic-unit').value = user.unit;
            }
        }

        function renderUserSearchSelect(currentVal = "", placeholder = "Cari user...") {
            return `
                <div class="searchable-select">
                    <div style="position:relative; display:flex; align-items:center;">
                        <span class="material-symbols-outlined" style="position:absolute; left:12px; font-size:18px; color:var(--text-muted);">search</span>
                        <input type="text" id="edit-basic-proposer" value="${currentVal}" placeholder="${placeholder}" 
                               onfocus="this.closest('.searchable-select').querySelector('.dropdown-list').style.display='block'" 
                               onkeyup="filterGeneric(this)" class="f-input" style="padding-left:40px;">
                    </div>
                    <div class="dropdown-list">
                        ${registeredUsers.map(u => `
                            <div class="dropdown-item" onclick="selectGeneric(this, '${u.name}')">
                                <div class="item-title">${u.name}</div>
                                <div class="item-sub">${u.unit} - ${u.role}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderFiles() {
            const container = document.getElementById('proposal-files-container');
            if (!container) return;
            container.innerHTML = '';

            if (!currentProgram || !currentProgram.files || currentProgram.files.length === 0) {
                return; // no files required
            }

            let html = `
                <div class="group-container">
                    <div class="group-header" style="display:flex; align-items:center; gap:8px;">
                        <span class="material-symbols-outlined">folder</span>
                        Berkas Lampiran
                    </div>
                    <div style="display:flex; flex-direction:column; gap:12px;">
            `;

            let visibleFilesCount = 0;

            currentProgram.files.forEach((f, idx) => {
                // Role check
                if (f.roles && f.roles.length > 0 && !f.roles.includes('All')) {
                    if (!f.roles.includes(currentUser.role)) return; // hidden from this role
                } else if (f.role && f.role !== 'All') {
                    if (f.role === 'Admin' && !['Superadmin', 'Admin'].includes(currentUser.role)) return;
                    if (f.role === 'Reviewer' && !['Superadmin', 'Admin', 'Manager', 'Reviewer'].includes(currentUser.role)) return;
                    if (f.role === 'Pengusul' && currentUser.role !== 'Pengusul') return;
                }

                visibleFilesCount++;

                // Status check
                const isStatusAllowed = !f.statusRequired || f.statusRequired === currentProposal.status;
                
                // Existing file?
                const fileData = (currentProposal.customFiles && currentProposal.customFiles[f.label]) || null;
                const extensionsStr = f.exts ? f.exts.map(e => '.'+e).join(', ') : (f.extensions ? f.extensions : '.pdf');

                html += `
                    <div style="background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1rem; display:flex; align-items:center; gap:16px;">
                        <div style="width:40px; height:40px; border-radius:10px; background:var(--primary-soft); color:var(--primary); display:flex; align-items:center; justify-content:center;">
                            <span class="material-symbols-outlined">description</span>
                        </div>
                        <div style="flex:1; display:flex; flex-direction:column; gap:4px;">
                            <div style="font-weight:700; font-size:0.9rem; color:var(--text-main);">${f.label} ${f.required ? '<span style="color:var(--error); font-weight:900;">*</span>' : ''}</div>
                            <div style="font-size:0.75rem; color:var(--text-muted);">
                                ${isStatusAllowed ? `Ekstensi: ${extensionsStr} &bull; Maks: ${f.maxSize || 5}MB` : `<span style="color:var(--error);">Hanya dapat diunggah saat status ${f.statusRequired}</span>`}
                            </div>
                        </div>
                        <div style="display:flex; align-items:center; gap:12px;">
                            ${fileData ? `
                                <div style="display:flex; align-items:center; gap:8px; background:var(--bg-main); padding:6px 12px; border-radius:20px; font-size:0.8rem; font-weight:600;">
                                    <span class="material-symbols-outlined" style="font-size:16px; color:var(--success);">check_circle</span>
                                    <a href="${fileData.url}" target="_blank" style="color:var(--text-main); text-decoration:none;">${fileData.name}</a>
                                </div>
                                ${isStatusAllowed ? `
                                <button onclick="triggerProposalFileUpload('${f.label}')" class="btn-icon" style="width:auto; padding:6px 12px; font-size:0.75rem;"><span class="material-symbols-outlined" style="font-size:14px;">edit</span> Ubah</button>
                                ` : ''}
                            ` : `
                                <span style="font-size:0.8rem; color:var(--text-muted); font-weight:600;">Belum ada berkas</span>
                                ${isStatusAllowed ? `
                                <button onclick="triggerProposalFileUpload('${f.label}')" class="btn-apply" style="padding:8px 16px; font-size:0.8rem; border-radius:8px;"><span class="material-symbols-outlined" style="font-size:16px;">upload</span> Unggah</button>
                                ` : `
                                <button disabled class="btn-apply" style="padding:8px 16px; font-size:0.8rem; border-radius:8px; opacity:0.5; cursor:not-allowed;"><span class="material-symbols-outlined" style="font-size:16px;">lock</span> Terkunci</button>
                                `}
                            `}
                        </div>
                    </div>
                `;
            });

            html += `</div></div>`;
            
            if (visibleFilesCount > 0) {
                container.innerHTML = html;
            }
        }

        window.triggerProposalFileUpload = function(label) {
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            
            fileInput.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(evt) {
                    const dataUrl = evt.target.result;
                    if (!currentProposal.customFiles) currentProposal.customFiles = {};
                    currentProposal.customFiles[label] = {
                        name: file.name,
                        url: dataUrl 
                    };
                    
                    try {
                        saveProposalSync();
                        renderFiles();
                        showToast(`'${file.name}' berhasil diunggah.`);
                    } catch (err) {
                        console.error('Storage error:', err);
                        alert('Penyimpanan Lokal Penuh! Berkas terlalu besar untuk disimpan dalam memori browser uji coba ini (batas ~5MB). Mohon gunakan berkas tiruan yang lebih kecil.');
                    }
                };
                reader.readAsDataURL(file);
            };
            
            fileInput.click();
        };

        function saveBasicInfo() {
            const newTitle = document.getElementById('edit-basic-title').value;
            const newProposer = document.getElementById('edit-basic-proposer').value;
            const newUnit = document.getElementById('edit-basic-unit').value;
            const newDate = document.getElementById('edit-basic-date').value;

            if (!newTitle || !newProposer || !newDate) {
                alert('Judul, Nama Pengusul, dan Tanggal tidak boleh kosong!');
                return;
            }

            currentProposal.title = newTitle;
            currentProposal.proposer = newProposer;
            currentProposal.unit = newUnit;
            currentProposal.date = newDate;

            saveProposalSync();
            closeModal();
            
            // Re-render UI labels
            document.getElementById('disp-title').innerText = currentProposal.title;
            document.getElementById('disp-proposer').innerText = currentProposal.proposer;
            document.getElementById('disp-unit').innerText = currentProposal.unit;
            document.getElementById('disp-date').innerText = currentProposal.date;

            showToast('Informasi utama berhasil diperbarui');
        }

        function assignReviewer() {
            const reviewer = document.getElementById('assign-reviewer-select').value;
            const dueDate = document.getElementById('assign-due-date').value;
            if (!reviewer || !dueDate) { alert('Harap pilih reviewer dan tentukan tenggat waktu!'); return; }

            if (!currentProposal.assignments) currentProposal.assignments = [];
            currentProposal.assignments.push({
                reviewer: reviewer,
                dueDate: dueDate,
                assignedBy: currentUser.name,
                status: 'Pending'
            });

            saveProposalSync();
            renderReviews();
            showToast('Reviewer berhasil ditugaskan');
        }

        function removeAssignment(idx) {
            if (!confirm('Batalkan penugasan ini?')) return;
            currentProposal.assignments.splice(idx, 1);
            saveProposalSync();
            renderReviews();
            showToast('Penugasan dibatalkan');
        }

        function saveProposalSync() {
            const pIdx = proposals.findIndex(p => String(p.id) === String(proposalId));
            proposals[pIdx] = currentProposal;
            localStorage.setItem('grants_proposals', JSON.stringify(proposals));
        }

        function openAddReviewModal(forcedReviewer = null) {
            const template = currentProgram.reviewTemplate || [
                { label: "Kesesuaian dengan Skema", type: "number", weight: 30 },
                { label: "Kualitas Rekam Jejak", type: "number", weight: 30 },
                { label: "Kualitas Usulan", type: "number", weight: 40 },
                { label: "Komentars", type: "longtext" }
            ];

            const periodOptions = (currentProgram.periods || []).map(p => `<option value="${p.name}">${p.name}</option>`).join('') || '<option value="Default">Periode Default</option>';

            const body = `
                <div class="settings-form">
                    <div class="form-group">
                        <label class="f-label">Reviewer</label>
                        <input type="text" value="${forcedReviewer || currentUser.name}" readonly class="f-input" id="rev-name" style="background:rgba(0,0,0,0.02)">
                    </div>
                    <div class="form-group">
                        <label class="f-label">Pilih Periode/Gelombang</label>
                        <select id="rev-period" class="f-input">${periodOptions}</select>
                    </div>
                    <hr style="margin:24px 0; border:none; border-top:1px solid var(--border);">

                        ${template.map((t, idx) => {

                            let inputHtml = "";
                            if (t.type === 'number') {
                                inputHtml = `<input type="number" id="${fieldId}" placeholder="0 - ${t.max || 100}" class="f-input" data-label="${t.label}" data-type="${t.type}" data-weight="${t.weight || 0}">`;
                            } else if (t.type === 'file') {
                                inputHtml = `
                                    <div id="file-cont-${idx}" class="file-preview">
                                        <span style="font-size:0.8rem; color:var(--text-muted);">Belum ada berkas</span>
                                        <button onclick="triggerFileUpload('file-cont-${idx}')" class="btn-icon" style="width:auto; padding:4px 12px; font-size:0.7rem; border-radius:8px;">Pilih Berkas</button>
                                    </div>
                                    <input type="hidden" id="${fieldId}" data-label="${t.label}" data-type="${t.type}">
                                `;
                            } else if (t.type === 'dropdown') {
                                inputHtml = `<select id="${fieldId}" class="f-input" data-label="${t.label}" data-type="${t.type}">
                                    <option value="">-- Pilih --</option>
                                    ${optionsList.map(o => `<option value="${o}">${o}</option>`).join('')}
                                </select>`;
                            } else if (t.type === 'yes no' || t.type === 'radio' || t.type === 'checkbox') {
                                const opts = t.type === 'yes no' ? ['Ya', 'Tidak'] : (t.type === 'checkbox' ? ['Ya', 'Tidak'] : optionsList);
                                inputHtml = `<div style="display:flex; flex-wrap:wrap; gap:16px; margin-top:12px;">
                                    ${opts.map(o => `
                                        <label class="f-radio-label" style="font-size:0.85rem;">
                                            <input type="radio" name="${fieldId}" value="${o}" data-label="${t.label}" data-type="${t.type}">
                                            <span class="f-radio-mark"></span>
                                            ${o}
                                        </label>
                                    `).join('')}
                                </div>`;
                            } else if (t.type === 'multiple options') {
                                inputHtml = `<div style="display:flex; flex-wrap:wrap; gap:12px; margin-top:12px;">
                                    ${optionsList.map(o => `
                                        <label class="f-check-label" style="font-size:0.85rem; padding:8px 16px; border-radius:12px; border:1px solid var(--border); background:white;">
                                            <input type="checkbox" data-group="${fieldId}" value="${o}" data-label="${t.label}" data-type="${t.type}">
                                            <span class="f-checkmark"></span>
                                            ${o}
                                        </label>
                                    `).join('')}
                                </div>`;
                            } else if (t.type === 'longtext' || t.type === 'longtext html') {
                                inputHtml = `<textarea id="${fieldId}" rows="4" class="f-input" data-label="${t.label}" data-type="${t.type}" placeholder="Masukkan ulasan detail di sini..."></textarea>`;
                            } else if (t.type === 'file') {
                                inputHtml = `
                                    <div id="cont-${fieldId}" class="f-input" style="display:flex; align-items:center; justify-content:space-between; height:auto; padding:12px 16px; background:rgba(0,0,0,0.02); border:1px dashed var(--border); border-radius:12px; cursor:pointer;" onclick="triggerFileUpload('cont-${fieldId}')">
                                        <div style="display:flex; align-items:center; gap:10px; color:var(--text-muted);">
                                            <span class="material-symbols-outlined">upload_file</span>
                                            <span style="font-size:0.85rem; font-weight:600;">Klik untuk unggah file review</span>
                                        </div>

                                    <input type="hidden" id="${fieldId}" data-label="${t.label}" data-type="file">
                                `;
                            } else if (t.type === 'formula') {
                                inputHtml = `<input type="text" id="${fieldId}" class="f-input" data-label="${t.label}" data-type="formula" readonly style="background:var(--primary-soft); color:var(--primary); font-family:monospace; font-weight:700;" placeholder="Otomatis dihitung...">`;

                    </div>
                    <div style="margin-top:32px; display:flex; justify-content:flex-end;">
                        <button class="btn-apply" onclick="saveReview('${forcedReviewer}')">Simpan Hasil Penilaian</button>
                    </div>
                </div>

            showModal('Forum Penilaian Usulan', body);
        }

        function triggerFileUpload(containerId) {
            const tempInput = document.createElement('input');
            tempInput.type = 'file';
            tempInput.onchange = e => {
                const file = e.target.files[0];
                if (file) {
                    const filename = file.name;
                    const cont = document.getElementById(containerId);
                    cont.innerHTML = `
                        <div style="display:flex; align-items:center; gap:8px;">
                            <span class="material-symbols-outlined" style="color:var(--primary); font-size:18px;">description</span>
                            <span style="font-size:0.85rem; font-weight:600;">${filename}</span>
                        </div>
                        <button onclick="triggerFileUpload('${containerId}')" style="background:none; border:none; color:var(--primary); font-size:0.75rem; cursor:pointer;">Ubah</button>
                    `;
                    const input = cont.nextElementSibling;
                    if (input) input.value = filename;
                    showToast('Berkas berhasil diunggah');
                }
            };
            tempInput.click();
        }

        function saveReview(forcedReviewer = null) {
            const template = currentProgram.reviewTemplate || [];
            const items = [];
            
            template.forEach((t, idx) => {
                const fieldId = `rev-val-${idx}`;
                let value = "";

                if (t.type === 'yes no' || t.type === 'radio' || t.type === 'checkbox') {
                    const checked = document.querySelector(`input[name="${fieldId}"]:checked`);
                    value = checked ? checked.value : "";
                } else if (t.type === 'multiple options') {
                    const checked = Array.from(document.querySelectorAll(`input[data-group="${fieldId}"]:checked`)).map(c => c.value);
                    value = checked.join(', ');
                } else {
                    const el = document.getElementById(fieldId);
                    value = el ? el.value : "";
                }

                items.push({
                    label: t.label,
                    type: t.type,
                    value: value,
                    weight: t.weight || 0
                });
            });

            const newReview = {
                reviewer: forcedReviewer || currentUser.name,
                period: document.getElementById('rev-period').value,
                date: new Date().toLocaleDateString('id-ID'),
                items: items
            };

            if (!currentProposal.reviews) currentProposal.reviews = [];
            currentProposal.reviews.push(newReview);

            // If this was from an assignment, remove it
            if (forcedReviewer && currentProposal.assignments) {
                currentProposal.assignments = currentProposal.assignments.filter(as => as.reviewer !== forcedReviewer);
            }

            saveProposalSync();
            closeModal();
            renderReviews();
            showToast('Penilaian berhasil disimpan!');
        }

        function deleteReview(idx) {
            if (!confirm('Hapus penilaian ini?')) return;
            currentProposal.reviews.splice(idx, 1);
            const pIdx = proposals.findIndex(p => String(p.id) === String(proposalId));
            proposals[pIdx] = currentProposal;
            localStorage.setItem('grants_proposals', JSON.stringify(proposals));
            renderReviews();
        }

        function userCanView(attr) {
            if (!attr.viewRoles || attr.viewRoles.length === 0) return true;
            let roles = [currentUser.role];
            if (currentProposal && currentProposal.proposer) {
                const proposerClean = currentProposal.proposer.trim().toLowerCase();
                const currNameClean = currentUser.name.replace('Dr. ', '').replace('Prof. ', '').trim().toLowerCase();
                if (proposerClean.includes(currNameClean) || currNameClean.includes(proposerClean)) {
                    roles.push('Pengusul');
                }
            }
            return attr.viewRoles.some(r => roles.includes(r));
        }

        function userCanEdit(attr) {
            if (!attr.editRoles || attr.editRoles.length === 0) return true;
            let roles = [currentUser.role];
            if (currentProposal && currentProposal.proposer) {
                const proposerClean = currentProposal.proposer.trim().toLowerCase();
                const currNameClean = currentUser.name.replace('Dr. ', '').replace('Prof. ', '').trim().toLowerCase();
                if (proposerClean.includes(currNameClean) || currNameClean.includes(proposerClean)) {
                    roles.push('Pengusul');
                }
            }
            return attr.editRoles.some(r => roles.includes(r));
        }

        function init() {
            const mockSelect = document.getElementById('mock-login');
            if (mockSelect) {
                mockSelect.innerHTML = registeredUsers.map(u => `<option value="${u.name}" ${u.name === currentUser.name ? 'selected' : ''}>${u.name} (${u.role})</option>`).join('');
            }

            if (!proposalId) {
                location.href = 'index.html';
                return;
            }

            // Sync with newest storage data
            const freshProposals = JSON.parse(localStorage.getItem('grants_proposals')) || proposals;
            currentProposal = freshProposals.find(p => String(p.id) === String(proposalId));

            if (!currentProposal) {
                alert('Galat: Usulan dengan ID #' + proposalId + ' tidak ditemukan.');
                window.location.href = 'index.html';
                return;
            }

            const freshPrograms = JSON.parse(localStorage.getItem('grants_programs_meta')) || programs;

            // Match program with high tolerance
            currentProgram = freshPrograms.find(pg =>
                pg.name.trim().toLowerCase() === currentProposal.program.trim().toLowerCase()
            );

            if (!currentProgram) {
                console.error("Program metadata missing for study:", currentProposal.program);
                alert("Peringatan: Metadata untuk program '" + currentProposal.program + "' tidak ditemukan. Beberapa fitur mungkin tidak lengkap.");
            }

            // Render basic info
            document.getElementById('proposal-id-tag').innerText = `ID: #${currentProposal.id}`;
            document.getElementById('disp-title').innerText = currentProposal.title;
            document.getElementById('disp-proposer').innerText = currentProposal.proposer;
            document.getElementById('disp-unit').innerText = currentProposal.unit;
            document.getElementById('disp-date').innerText = currentProposal.date;
            
            // Render specific status options
            renderStatusOptions();

            // Check for initial auto-status hint
            checkAutoStatus(false);

            // Update Back Link to original program dashboard if possible
            if (currentProgram && currentProgram.id) {
                document.getElementById('nav-back-link').href = `index.html?p=${currentProgram.id}&tab=usulan`;
            }

            // Check Blacklist status
            checkBlacklist();

            // Render dynamic form
            renderAttributes();
            renderFiles();
        }

        function renderStatusOptions() {
            const select = document.getElementById('update-status');
            const defaultStatuses = [
                { label: "Submitted", color: "#6366f1" },
                { label: "Internal Review", color: "#f59e0b" },
                { label: "Received", color: "#10b981" },
                { label: "Needs Revision", color: "#ef4444" },
                { label: "Rejected", color: "#1e293b" }
            ];

            const programStatuses = (currentProgram && currentProgram.statuses && currentProgram.statuses.length > 0) 
                ? currentProgram.statuses 
                : defaultStatuses;

            select.innerHTML = programStatuses.map(s => `
                <option value="${s.label}" data-color="${s.color || '#6366f1'}">${s.label}</option>
            `).join('');

            // Restore current status
            select.value = currentProposal.status;
            updateStatusBadge();
        }

        function updateStatusBadge() {
            const select = document.getElementById('update-status');
            const opt = select.options[select.selectedIndex];
            const color = opt ? opt.dataset.color : '#6366f1';
            
            const badge = document.getElementById('disp-status');
            badge.innerText = select.value;
            badge.style.background = `${color}15`;
            badge.style.color = color;
        }

        function checkAutoStatus(applyToSelect = true) {
            if (!currentProgram || !currentProgram.statuses) return;
            
            const hint = document.getElementById('auto-status-hint');
            hint.innerText = '';

            const customData = {};
            // Gather current input values
            if (currentProgram.attributes) {
                currentProgram.attributes.forEach((attr, idx) => {
                    const el = document.getElementById(`attr-${idx}`);
                    if (el) {
                        customData[attr.label] = el.value;
                    } else {
                        // For radios/checkboxes (not yet updated in currentProposal)
                        const radio = document.querySelector(`input[name="attr-${idx}"]:checked`);
                        if(radio) customData[attr.label] = radio.value;
                    }
                });
            }

            // Also check currentProposal's existing data as fallback
            const dataToEval = { ...currentProposal.customData, ...customData };
            
            for (const s of currentProgram.statuses) {
                if (s.trigger) {
                    try {
                        let expression = s.trigger;
                        for (const key in dataToEval) {
                            const val = isNaN(dataToEval[key]) ? `'${dataToEval[key]}'` : dataToEval[key];
                            expression = expression.replace(new RegExp(`{${key}}`, 'g'), val || 0);
                        }
                        
                        // Security check: only allow basic comparisons
                        if (eval(expression)) {
                            hint.innerText = `Catatan: Aturan "${s.trigger}" terpenuhi. Status disarankan: ${s.label}`;
                            if (applyToSelect && document.getElementById('update-status').value !== s.label) {
                                document.getElementById('update-status').value = s.label;
                                updateStatusBadge();
                                enableSave();
                            }
                            break;
                        }
                    } catch (e) { console.warn("Trigger eval error:", e); }
                }
            }
        }

        function checkBlacklist() {
            const banner = document.getElementById('blacklist-banner');
            if (currentProposal.isBlacklisted) {
                banner.style.display = 'block';
                banner.innerHTML = `
                    <div class="glass" style="background:rgba(239,68,68,0.05); padding:24px; border:1px solid var(--error); border-radius:20px; display:flex; gap:20px; align-items:flex-start;">
                        <span class="material-symbols-outlined" style="color:var(--error); font-size:40px;">report</span>
                        <div>
                            <div style="font-weight:700; color:var(--error); font-size:1rem; text-transform:uppercase;">Peringatan: Pengusul Bermasalah (Daftar Hitam)</div>
                            <p style="font-size:0.9rem; color:var(--text-main); margin-top:8px;">User ini terdeteksi dalam daftar cekal saat mengirimkan usulan ini.</p>
                            <div style="margin-top:12px; padding:12px; background:white; border-radius:12px; border:1px solid rgba(239,68,68,0.2); font-size:0.85rem;">
                                <strong>Alasan:</strong> ${currentProposal.blacklistNote || 'Tidak ada catatan khusus.'}
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        function renderAttributes() {
            const authorsList = document.getElementById('proposal-authors');
            if (currentProposal.authors && currentProposal.authors.length > 0) {
                authorsList.innerHTML = currentProposal.authors.map(m => `
                    <div class="glass" style="padding:16px; border-radius:12px; border:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:white;">
                        <div style="display:flex; gap:12px; align-items:center;">
                            <div style="width:36px; height:36px; border-radius:50%; background:var(--primary-soft); color:var(--primary); display:flex; align-items:center; justify-content:center;">
                                <span class="material-symbols-outlined" style="font-size:18px;">person</span>
                            </div>
                            <div>
                                <div style="font-weight:800; font-size:0.95rem; color:var(--text-main); line-height:1.2;">${m.name}</div>
                                <div style="font-size:0.7rem; color:var(--text-muted);">${m.unit} • ${m.email}</div>
                            </div>
                        </div>
                        <span class="status-badge" style="font-size:0.6rem; background:${m.role === 'First Author' ? 'var(--primary)' : 'var(--background)'}; color:${m.role === 'First Author' ? 'white' : 'var(--text-muted)'}; border:none;">${m.role}</span>
                    </div>
                `).join('');
            } else {
                authorsList.innerHTML = `
                    <div class="glass" style="padding:16px; border-radius:12px; border:1px solid var(--border); display:flex; gap:12px; align-items:center; background:white;">
                         <div style="width:36px; height:36px; border-radius:50%; background:var(--primary-soft); color:var(--primary); display:flex; align-items:center; justify-content:center;">
                            <span class="material-symbols-outlined" style="font-size:18px;">person</span>
                        </div>
                        <div>
                            <div style="font-weight:800; font-size:0.95rem; color:var(--text-main); line-height:1.2;">${currentProposal.proposer}</div>
                            <div style="font-size:0.7rem; color:var(--text-muted);">${currentProposal.unit || '-'} • ${currentProposal.email || '-'}</div>
                        </div>
                        <span class="status-badge" style="font-size:0.6rem; margin-left:auto;">First Author</span>
                    </div>
                `;
            }

            const container = document.getElementById('dynamic-form-container');
            container.innerHTML = '';

            if (!currentProgram || !currentProgram.attributes) {
                container.innerHTML = '<p style="color:var(--text-muted); font-style:italic;">Tidak ada atribut tambahan untuk program ini.</p>';
                return;
            }

            const groups = {};
            currentProgram.attributes.forEach((attr, idx) => {
                if (!userCanView(attr)) return;
                const groupName = (attr.group || 'Informasi Tambahan').trim();
                if (!groups[groupName]) groups[groupName] = [];
                groups[groupName].push({ ...attr, originalIdx: idx });
            });

            const groupKeys = Object.keys(groups);
            if (groupKeys.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted); font-style:italic; font-size:0.85rem;">Tidak ada atribut yang dapat dilihat oleh role Anda.</p>';
                return;
            }

            let htmlString = `<div class="group-container" style="display:flex; flex-direction:column; gap:32px;">`;

            groupKeys.forEach((groupName, i) => {
                let gpHtml = `<div>`;
                
                if (!(groupKeys.length === 1 && groupName === 'Informasi Tambahan')) {
                    gpHtml += `<div class="group-header">${groupName}</div>`;
                } else {
                    gpHtml += `<div style="margin-top:8px;"></div>`; 
                }

                gpHtml += `<div style="display:grid; grid-template-columns:1fr; gap:20px;">`;

                groups[groupName].forEach(attr => {
                    const val = (currentProposal.customData && currentProposal.customData[attr.label]) || '';
                    const fieldId = `attr-${attr.originalIdx}`;
                    const disabledStr = userCanEdit(attr) ? '' : 'disabled';

                    let inputHtml = '';
                    if (attr.type === 'longtext' || attr.type === 'longtext html') {
                        inputHtml = `<textarea id="${fieldId}" rows="4" class="f-input" onchange="enableSave()" ${disabledStr}>${val}</textarea>`;
                    } else if (attr.type === 'dropdown') {
                        inputHtml = `<select id="${fieldId}" class="f-input" onchange="enableSave()" ${disabledStr}>
                            <option value="">-- Pilih --</option>
                            ${attr.options.map(o => `<option value="${o}" ${o === val ? 'selected' : ''}>${o}</option>`).join('')}
                        </select>`;
                    } else if (attr.type === 'yes no') {
                        inputHtml = `<select id="${fieldId}" class="f-input" onchange="enableSave()" ${disabledStr}>
                            <option value="Ya" ${val === 'Ya' ? 'selected' : ''}>Ya</option>
                            <option value="Tidak" ${val === 'Tidak' ? 'selected' : ''}>Tidak</option>
                        </select>`;
                    } else if (attr.type === 'file' || attr.type === 'file upload') {
                        inputHtml = `<div class="file-preview"><span style="color:var(--text-muted); font-size:0.8rem;">[Berkas Lampiran]</span></div>`;
                    } else if (attr.type === 'radio') {
                        inputHtml = `<div style="display:flex; flex-wrap:wrap; gap:16px; margin-top:12px;">
                            ${attr.options.map(o => `
                                <label class="f-radio-label" style="font-size:0.85rem;">
                                    <input type="radio" name="${fieldId}" value="${o}" ${o === val ? 'checked' : ''} onchange="enableSave()" ${disabledStr}> ${o}
                                    <span class="f-radio-custom"></span>
                                </label>
                            `).join('')}
                        </div>`;
                    } else if (attr.type === 'multiple options') {
                        const vals = Array.isArray(val) ? val : (val ? val.split(', ') : []);
                        inputHtml = `<div style="display:flex; flex-wrap:wrap; gap:16px; margin-top:12px;">
                            ${attr.options.map(o => `
                                <label class="f-check-label" style="font-size:0.85rem;">
                                    <input type="checkbox" name="${fieldId}" value="${o}" ${vals.includes(o) ? 'checked' : ''} onchange="enableSave()" ${disabledStr}> ${o}
                                    <span class="f-checkmark"></span>
                                </label>
                            `).join('')}
                        </div>`;
                    } else if (attr.type === 'formula') {
                        const budgetVal = (currentProposal.customData && currentProposal.customData['Anggaran yang Diajukan (IDR)']) || '0';
                        inputHtml = `<div style="padding:12px; background:rgba(99,102,241,0.05); border:1px solid var(--border); border-radius:12px; font-family:monospace; color:var(--primary); font-weight:700; margin-top:8px;">
                            ${attr.formula.replace('{Anggaran}', budgetVal)}
                        </div>`;
                    } else if (attr.type === 'file') {
                        // Already handled in file sections but fallback legacy mode
                        inputHtml = `<div class="file-preview"><span style="color:var(--text-muted); font-size:0.8rem;">[Berkas Lampiran Legacy]</span></div><input type="hidden" id="${fieldId}" value="${val}">`;
                    } else {
                        inputHtml = `<input type="${attr.type}" id="${fieldId}" value="${val}" class="f-input" onchange="enableSave()" ${disabledStr}>`;
                    }

                    gpHtml += `
                        <div class="form-group" style="margin:0;">
                            <label class="f-label">${attr.label} ${attr.required ? '<span style="color:var(--error)">*</span>' : ''}</label>
                            ${inputHtml}
                            ${attr.desc ? `<div style="font-size:0.75rem; color:var(--text-muted); margin-top:6px;">${attr.desc}</div>` : ''}
                        </div>
                    `;
                });

                gpHtml += `</div></div>`;
                htmlString += gpHtml;
            });

            htmlString += `</div>`;
            container.innerHTML = htmlString;
        }

        function enableSave() {
            const btn = document.getElementById('btn-save');
            btn.style.opacity = '1';
            btn.style.pointerEvents = 'all';
        }

        function saveChanges() {
            // First check if any auto-triggers apply before final save
            checkAutoStatus(true);

            const newStatus = document.getElementById('update-status').value;
            currentProposal.status = newStatus;

            const customData = currentProposal.customData || {};
            if (currentProgram && currentProgram.attributes) {
                currentProgram.attributes.forEach((attr, idx) => {
                    if (!userCanEdit(attr)) return;
                    const fieldId = `attr-${idx}`;

                    if (attr.type === 'radio') {
                        const checked = document.querySelector(`input[name="${fieldId}"]:checked`);
                        customData[attr.label] = checked ? checked.value : '';
                    } else if (attr.type === 'multiple options') {
                        const checked = Array.from(document.querySelectorAll(`input[name="${fieldId}"]:checked`)).map(c => c.value);
                        customData[attr.label] = checked;
                    } else {
                        const el = document.getElementById(fieldId);
                        if (el) customData[attr.label] = el.value;
                    }
                });
            }
            currentProposal.customData = customData;

            // Save back to storage
            const idx = proposals.findIndex(p => String(p.id) === String(proposalId));
            proposals[idx] = currentProposal;
            localStorage.setItem('grants_proposals', JSON.stringify(proposals));

            showToast();

            // Reset UI
            document.getElementById('btn-save').style.opacity = '0.6';
            document.getElementById('btn-save').style.pointerEvents = 'none';
            document.getElementById('disp-status').innerText = newStatus;
        }

        function showToast(msg = "Berhasil diperbarui!") {
            const t = document.getElementById('toast');
            const m = document.getElementById('toast-msg');
            m.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        init();
        renderReviews();
    </script>
</body>
