<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProSpace | Platform Manajemen Hibah Penelitian</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="index.css">
    <style>
        /* Modern Layout & Component Logic */
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 5%; }
        .grid-cols-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2.5rem; }
        @media (max-width: 1024px) { .grid-cols-3 { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .grid-cols-3 { grid-template-columns: 1fr; } }

        nav { height: 80px; display: flex; align-items: center; justify-content: space-between; padding: 0 5%; position: sticky; top: 0; z-index: 1000; background: rgba(255, 255, 255, 0.82); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .nav-links { display: flex; align-items: center; gap: 3rem; flex: 1; justify-content: center; }
        .nav-link { text-decoration: none; font-weight: 700; color: var(--text-muted); font-size: 0.95rem; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; letter-spacing: 0.02em; cursor: pointer; }
        .nav-link:hover { color: var(--primary); }
        .nav-link.active { color: var(--text-main); }
        .nav-link.active::after { content: ''; position: absolute; bottom: -28px; left: 0; width: 100%; height: 4px; background: var(--primary); border-radius: 10px; }

        .program-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 2.5rem; display: flex; flex-direction: column; gap: 1.5rem; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); cursor: pointer; position: relative; overflow: hidden; box-shadow: var(--shadow-sm); }
        .program-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: var(--shadow-float); }
        .program-icon { width: 56px; height: 56px; border-radius: 16px; background: var(--primary-soft); color: var(--primary); display: flex; align-items: center; justify-content: center; }

        #login-gate { position: fixed; inset: 0; z-index: 10000; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .login-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid white; border-radius: 32px; padding: 3rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); max-width: 420px; width: 100%; text-align: center; }
    </style>
</head>
<body>
    <!-- LOGIN GATE -->
    <div id="login-gate">
        <div class="login-card glass animate-pop-in">
            <div class="logo" style="justify-content:center; margin-bottom:2rem;">
                <div class="logo-icon"><span class="material-symbols-outlined" style="font-size:32px;">rocket_launch</span></div>
                <div style="display:flex; align-items:baseline;">
                    <span class="logo-text-pro">Pro</span><span class="logo-text-space">Space</span>
                </div>
            </div>
            <h2 style="font-family:'Outfit'; font-weight:800; margin-bottom:0.5rem;">Selamat Datang</h2>
            <p style="color:var(--text-muted); margin-bottom:2rem; font-size:0.9rem;">Masuk ke Dashboard Manajemen Hibah</p>
            <div class="f-group" style="margin-bottom:1rem;">
                <input type="email" id="login-email" class="f-input" placeholder="Alamat E-mail" style="text-align:center;">
            </div>
            <div id="group-appscript-url" style="display:none;">
                <input type="text" id="login-appscript-url" class="f-input" placeholder="Google Apps Script URL" style="text-align:center; font-size:0.8rem;">
            </div>
            <button class="btn-primary" onclick="startAppWithSync()" style="width:100%; height:52px; margin-top:1.5rem; border-radius:14px; font-weight:850;">
                <span class="material-symbols-outlined" style="font-size:20px;">sync_alt</span> Hubungkan & Masuk
            </button>
            <p id="login-hint" style="margin-top:1.5rem; font-size:0.75rem; color:var(--text-muted); cursor:pointer;" onclick="document.getElementById('group-appscript-url').style.display='block'">Konfigurasi Server API</p>
        </div>
    </div>

    <!-- MAIN APP CONTAINER -->
    <div id="main-app-container" style="display:none;">
        <nav>
            <a href="index.html" class="logo">
                <div class="logo-icon"><span class="material-symbols-outlined">rocket_launch</span></div>
                <div style="display:flex; align-items:baseline;">
                    <span class="logo-text-pro">Pro</span><span class="logo-text-space">Space</span>
                </div>
            </a>
            <div class="nav-links">
                <a href="#" onclick="switchMainView('program')" class="nav-link active">Program</a>
                <a href="#" onclick="switchMainView('users')" class="nav-link">User & Kebijakan</a>
                <a href="#" onclick="switchMainView('guide')" class="nav-link">Panduan</a>
            </div>
            <div style="display:flex; align-items:center; gap:1.5rem;">
                <div id="sync-hub-display" class="glass" style="padding:6px 14px; border-radius:12px; display:flex; align-items:center; gap:8px; font-size:0.75rem; font-weight:700;">
                    <span class="material-symbols-outlined" id="sync-icon" style="font-size:18px; color:var(--secondary);">cloud_done</span>
                    <span id="sync-time-rel">Terhubung</span>
                    <div id="sync-status-dot" style="width:8px; height:8px; border-radius:50%; background:var(--secondary);"></div>
                </div>
                <div onclick="toggleProfileDropdown()" id="profile-trigger" style="cursor:pointer; display:flex; align-items:center; gap:10px;">
                    <div style="text-align:right;">
                        <div id="nav-user-name" style="font-weight:900; font-size:0.9rem;">...</div>
                        <div id="nav-user-role" style="font-size:0.65rem; font-weight:800; color:var(--primary); text-transform:uppercase;">ADMIN</div>
                    </div>
                    <div style="width:40px; height:40px; border-radius:12px; background:var(--primary-soft); color:var(--primary); display:flex; align-items:center; justify-content:center;">
                        <span class="material-symbols-outlined">person</span>
                    </div>
                </div>
            </div>
            <div id="profile-menu" class="glass shadow-xl" style="display:none; position:absolute; top:85px; right:5%; width:200px; padding:8px; border-radius:20px; z-index:2000;">
                <button onclick="logoutSession()" class="btn-secondary" style="width:100%; justify-content:flex-start; color:var(--error); border:none;"><span class="material-symbols-outlined">logout</span> Keluar</button>
            </div>
        </nav>

        <main class="container">
            <div id="view-dashboard">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2.5rem;">
                    <h1 style="font-family:'Outfit'; font-weight:950; font-size:2.8rem; letter-spacing:-0.03em;">Program Hibah</h1>
                    <button class="btn-primary" onclick="window.alert('Gunakan v2.7.1 untuk fitur lengkap')" style="height:52px; padding:0 24px; border-radius:14px; font-weight:850;">+ Tambah Program</button>
                </div>
                <div id="program-grid" class="grid-cols-3"></div>
            </div>
            <div id="view-users" style="display:none;"></div>
            <div id="view-guide" style="display:none;"></div>
            <div id="view-program-detail" style="display:none;"></div>
        </main>
    </div>

    <div id="toast" class="toast-container"><span id="toast-msg"></span></div>

    <script>
        const APP_VERSION = "v2.7.1";
        let programs = JSON.parse(localStorage.getItem('grants_programs_meta')) || [];
        let currentUser = JSON.parse(localStorage.getItem('grants_current_user'));

        window.showToast = function(msg) {
            const t = document.getElementById('toast');
            const m = document.getElementById('toast-msg');
            if(!t || !m) return;
            m.innerText = msg;
            t.style.opacity = '1'; t.style.transform = 'translateY(0) translateX(-50%)';
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(-100px) translateX(-50%)'; }, 3000);
        };

        window.startAppWithSync = async function() {
            const email = document.getElementById('login-email').value;
            const urlInput = document.getElementById('login-appscript-url').value;
            const url = (urlInput ? urlInput.trim() : '') || localStorage.getItem('grants_appscript_url');
            
            if (!email) return alert("Masukkan e-mail!");
            if (!url) return alert("Apps Script URL tidak terdeteksi!");

            showToast("Menghubungkan ke Server Hub...");
            try {
                const res = await fetch(`${url}?action=pull`);
                const data = await res.json();
                if (data) {
                    localStorage.setItem('grants_appscript_url', url);
                    localStorage.setItem('grants_programs_meta', JSON.stringify(data.programs || []));
                    const user = (data.registeredUsers || []).find(u => u.email === email) || { name: email.split('@')[0], email, role: 'Superadmin' };
                    localStorage.setItem('grants_current_user', JSON.stringify(user));
                    location.reload();
                }
            } catch (e) {
                alert("Koneksi gagal! Periksa URL Apps Script Anda dan pastikan sudah di-deploy sebagai 'Anyone'.");
            }
        };

        window.renderDashboardGrid = function() {
            const grid = document.getElementById('program-grid');
            if (!grid) return;
            grid.innerHTML = (programs || []).map(p => `
                <div class="program-card glass animate-fade-in" onclick="window.alert('Program: ' + '${p.name}')">
                    <div class="program-icon"><span class="material-symbols-outlined">${p.icon || 'rocket_launch'}</span></div>
                    <h2 style="font-family:'Outfit'; font-weight:800; font-size:1.5rem;">${p.name}</h2>
                    <p style="color:var(--text-muted); font-size:0.9rem;">${p.desc || 'Kelola usulan penelitian dan hibah.'}</p>
                </div>
            `).join('');
        };

        window.switchMainView = function(view) {
            ['view-dashboard', 'view-users', 'view-guide'].forEach(v => document.getElementById(v).style.display = 'none');
            const targetId = view === 'program' ? 'view-dashboard' : view === 'users' ? 'view-users' : 'view-guide';
            document.getElementById(targetId).style.display = 'block';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.querySelector(`.nav-link[onclick*='${view}']`).classList.add('active');
        };

        window.logoutSession = function() {
            localStorage.removeItem('grants_current_user');
            location.reload();
        };

        window.toggleProfileDropdown = function() {
            const m = document.getElementById('profile-menu');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        };

        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const scriptUrlParam = params.get('script');
            const setupField = document.getElementById('group-appscript-url');

            if (scriptUrlParam) {
                const url = scriptUrlParam.trim();
                localStorage.setItem('grants_appscript_url', url);
                if (setupField) setupField.style.display = 'none';
                
                try {
                    const res = await fetch(`${url}?action=pull`);
                    const data = await res.json();
                    if (data && data.programs) {
                        showToast("✅ Server Aktif / Terhubung!");
                        const dot = document.getElementById('sync-status-dot');
                        if(dot) dot.style.background = '#22c55e';
                    }
                } catch (e) {
                    showToast("❌ Server Tidak Terjangkau!");
                }
            }

            if (params.has('pii') || params.get('config') === 'true' || !localStorage.getItem('grants_appscript_url')) {
                if(setupField && !scriptUrlParam) setupField.style.display = 'block';
            }

            if (currentUser) {
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('main-app-container').style.display = 'block';
                document.getElementById('nav-user-name').innerText = currentUser.name;
                document.getElementById('nav-user-role').innerText = currentUser.role || 'GUEST';
                renderDashboardGrid();
            }
        });
    </script>
</body>
</html>
