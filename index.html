<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProSpace | Manajemen Hibah Penelitian</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        /* Component-Specific Overrides */
        nav { height: 72px; display: flex; align-items: center; justify-content: space-between; padding: 0 5%; position: sticky; top: 0; z-index: 1000; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); gap: 2rem; }
        [data-theme="dark"] nav { background: rgba(15, 23, 42, 0.8); }
        .logo { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }
        .logo-text-pro { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 900; color: var(--primary); letter-spacing: -0.02em; }
        .logo-text-space { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: var(--text-main); font-style: italic; margin-left: -2px; }
        .logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 6px 16px var(--primary-soft); }
        #login-gate { position: fixed; inset: 0; z-index: 10000; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 2rem; }
        .login-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid white; border-radius: 32px; padding: 3rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); max-width: 420px; width: 100%; }
        #main-app-container { display: none; }
    </style>
</head>

<body data-theme="light">
    <!-- LOGIN GATE -->
    <div id="login-gate">
        <div class="login-card animate-fade-in">
            <a href="index.html" class="logo" style="margin-bottom:2rem; justify-content:center;">
                <div class="logo-icon"><span class="material-symbols-outlined">rocket_launch</span></div>
                <div><span class="logo-text-pro">Pro</span><span class="logo-text-space">Space</span></div>
            </a>
            <h1 style="font-size:2.2rem; font-weight:900; text-align:center; letter-spacing:-0.03em;">Elevate Research</h1>
            <div style="display:grid; gap:1rem; margin-top:2rem;">
                <input type="email" id="login-email" class="f-input" placeholder="Email">
                <input type="password" id="login-password" class="f-input" placeholder="Password">
                <input type="url" id="login-appscript-url" class="f-input" placeholder="Apps Script URL" style="display:none;">
                <button onclick="startAppWithSync()" class="btn-primary" style="height:52px; width:100%;">Masuk Sekarang</button>
            </div>
            <p style="margin-top:2rem; text-align:center; font-size:0.75rem; color:var(--text-muted);">v2.6.9 &copy; 2026 Admin ProSpace</p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app-container">
        <nav>
            <a href="index.html" class="logo">
                <div class="logo-icon"><span class="material-symbols-outlined">rocket_launch</span></div>
                <div><span class="logo-text-pro">Pro</span><span class="logo-text-space">Space</span></div>
            </a>
            <div class="nav-links" id="main-nav-links">
                <a href="#" onclick="switchMainView('program')" class="nav-link active">Program</a>
                <a href="#" onclick="switchMainView('users')" class="nav-link" id="nav-users">User & Kebijakan</a>
                <a href="#" onclick="switchMainView('guide')" class="nav-link">Panduan</a>
            </div>
            <div style="display:flex; align-items:center; gap:1rem;">
                <div id="sync-hub-display" style="display:flex; align-items:center; gap:8px; padding:6px 12px; background:var(--surface); border:1px solid var(--border); border-radius:12px;">
                    <span class="material-symbols-outlined" id="sync-icon" style="color:var(--secondary);">cloud_done</span>
                    <span id="sync-time-rel" style="font-size:0.75rem; font-weight:800; color:var(--text-main);">Baru saja</span>
                </div>
                <div onclick="toggleProfileDropdown()" id="profile-dropdown-trigger" style="cursor:pointer; display:flex; align-items:center; gap:10px;">
                    <div class="avatar-soft"><span class="material-symbols-outlined">person</span></div>
                    <div style="text-align:left;"><div id="nav-user-name" style="font-weight:900; font-size:0.9rem;">...</div><div id="nav-user-role" style="font-size:0.7rem; color:var(--primary);">...</div></div>
                </div>
            </div>
        </nav>

        <main class="container">
            <div id="dashboard-view">
                <div class="section-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
                    <h1>Program Hibah</h1>
                    <button id="btn-add-program" class="btn-primary" onclick="openAddProgramModal()">+ Tambah Program</button>
                </div>
                <div id="program-grid" class="grid-cols-3"></div>
            </div>

            <div id="global-users-view" style="display:none;"></div>
            <div id="global-guide-view" style="display:none;"></div>
            <div id="program-dashboard" style="display:none;"></div>
            <div id="proposal-detail-view" style="display:none;"></div>
        </main>
    </div>

    <!-- Modals & Toasts -->
    <div id="modal-overlay" class="modal-overlay" style="display:none;" onclick="if(event.target===this) closeModal()">
        <div class="modal-card glass"><div class="modal-inner"><div class="modal-header"><h3 id="modal-title"></h3><button class="btn-icon" onclick="closeModal()"><span class="material-symbols-outlined">close</span></button></div><div id="modal-body" class="modal-body"></div></div></div>
    </div>
    <div id="toast" class="toast-container"><span class="material-symbols-outlined">check_circle</span> <span id="toast-msg"></span></div>

    <!-- CORE LOGIC & MODULAR ENGINES -->
    <script>
        const APP_VERSION = "v2.6.9";
        var programs = JSON.parse(localStorage.getItem('grants_programs_meta')) || [];
        var proposals = JSON.parse(localStorage.getItem('grants_proposals')) || [];
        var registeredUsers = JSON.parse(localStorage.getItem('grants_registeredUsers')) || [];
        var globalBlacklist = JSON.parse(localStorage.getItem('grants_global_blacklist')) || [];
        var globalPermissions = JSON.parse(localStorage.getItem('grants_global_permissions')) || {};
        var currentUser = JSON.parse(localStorage.getItem('grants_current_user'));

        const defaultPermissions = {
            'Superadmin': { programs: 2, users: 2, analysis: 2, finance: 2, settings: 2, view_logs: 2 },
            'Admin': { programs: 2, users: 1, analysis: 2, finance: 2, settings: 1, view_logs: 1 },
            'Reviewer': { programs: 0, users: 0, analysis: 1, finance: 0, settings: 0, view_logs: 0 }
        };
    </script>
    <script src="cloudSync.js"></script>
    <script src="programManager.js"></script>
    <script src="userManager.js"></script>
    <script src="proposalManager.js"></script>

    <script>
        // --- Glue Logic & Initialization ---
        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(0)';
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(-100px)'; }, 3000);
        }

        window.applyTheme = function(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('grants_theme', theme);
        };

        window.switchMainView = function(view) {
            document.getElementById('dashboard-view').style.display = view === 'program' ? 'block' : 'none';
            document.getElementById('global-users-view').style.display = view === 'users' ? 'block' : 'none';
            document.getElementById('global-guide-view').style.display = view === 'guide' ? 'block' : 'none';
            document.getElementById('program-dashboard').style.display = 'none';
            if (view === 'users') window.renderUsers();
        };

        window.renderDashboard = function() {
            const grid = document.getElementById('program-grid');
            grid.innerHTML = programs.map(p => `
                <div class="program-card glass animate-fade-in" onclick="renderProgramDashboard('${p.id}')">
                    <div class="program-icon"><span class="material-symbols-outlined">rocket_launch</span></div>
                    <h2>${p.name}</h2>
                    <p>${p.desc || ''}</p>
                    <div class="program-footer"><span>${p.status || 'Aktif'}</span></div>
                </div>
            `).join('');
        };

        async function startAppWithSync() {
            const email = document.getElementById('login-email').value;
            const url = localStorage.getItem('grants_appscript_url') || document.getElementById('login-appscript-url').value;
            if (!email || !url) return alert("Isi data login!");
            
            localStorage.setItem('grants_appscript_url', url);
            cloudSync.url = url;
            const data = await cloudSync.pull();
            if (data) {
                currentUser = data.registeredUsers.find(u => u.email === email) || { name: email, email, role: 'Superadmin' };
                localStorage.setItem('grants_current_user', JSON.stringify(currentUser));
                location.reload();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (currentUser) {
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('main-app-container').style.display = 'block';
                document.getElementById('nav-user-name').innerText = currentUser.name;
                document.getElementById('nav-user-role').innerText = currentUser.role;
                renderDashboard();
                if (cloudSync.url) cloudSync.pull();
            } else {
                if (!localStorage.getItem('grants_appscript_url')) document.getElementById('login-appscript-url').style.display = 'block';
            }
            if (localStorage.getItem('grants_theme')) applyTheme(localStorage.getItem('grants_theme'));
        });
    </script>
</body>
</html>
